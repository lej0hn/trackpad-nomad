name: Build Go Server

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Server
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: trackpad-server-linux
            asset_name: trackpad-server-linux-amd64
            goos: linux
            goarch: amd64
          - os: windows-latest
            artifact_name: trackpad-server.exe
            asset_name: trackpad-server-windows-amd64.exe
            goos: windows
            goarch: amd64
          - os: macos-latest
            artifact_name: trackpad-server-macos-intel
            asset_name: trackpad-server-macos-amd64
            goos: darwin
            goarch: amd64
          - os: macos-latest
            artifact_name: trackpad-server-macos-apple-silicon
            asset_name: trackpad-server-macos-arm64
            goos: darwin
            goarch: arm64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true
          cache-dependency-path: go/go.sum

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxext-dev libxkbcommon-dev libxkbcommon-x11-dev libxtst-dev

      - name: Build Executable
        working-directory: go
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1 # Robotgo needs CGO
        run: go build -v -o ${{ matrix.artifact_name }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: go/${{ matrix.artifact_name }}
