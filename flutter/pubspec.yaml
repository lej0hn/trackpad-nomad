name: touchpad2_client
description: Minimal TouchPad2 Flutter client scaffold
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^2.4.0
  mobile_scanner: ^5.0.0
  flutter_secure_storage: ^9.0.0
  google_fonts: ^6.3.2
  logger: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#16161D"
  adaptive_icon_foreground: "assets/icon.png"